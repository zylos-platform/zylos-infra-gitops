###############################################################################
# Valkey — Catalog cache-aside layer. Official valkey-io chart.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: valkey
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: cache
    zylos.app/environment: local
spec:
  project: platform
  sources:
    - repoURL: https://valkey.io/valkey-helm
      chart: valkey
      targetRevision: 0.10.0
      helm:
        releaseName: valkey
        valueFiles:
          - $values/helm-values/valkey/values.yaml
          - $values/helm-values/valkey/values-local.yaml

    - repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
      targetRevision: main
      path: components/platform/valkey/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: zylos-data-valkey
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
