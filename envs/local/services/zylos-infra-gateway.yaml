###############################################################################
# zylos-infra-gateway Argo CD Application.
# Composes helm/zylos-service-base with helm-values/services/values.yaml.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zylos-infra-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20" # After platform components and secrets
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: gateway
    zylos.app/environment: dev
spec:
  project: apps
  sources:
    - repoURL: https://github.com/zylos-platform/zylos-helm-charts.git
      targetRevision: main
      path: zylos-service-base
      helm:
        releaseName: zylos-infra-gateway
        valueFiles:
          - $values/helm-values/services/zylos-infra-gateway/values.yaml
          - $values/helm-values/services/zylos-infra-gateway/values-local.yaml

    - repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
      targetRevision: main
      path: components/services/zylos-infra-gateway/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: zylos-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
