apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zylos-netpol-prometheus
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # UI / remote-write / kubelet / Grafana queries
    - ports:
        - protocol: TCP
          port: 9090
  egress:
    # Scrape pod targets cluster-wide
    - to:
        - namespaceSelector: {}
    # Kube-API Server
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # DNS Resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
