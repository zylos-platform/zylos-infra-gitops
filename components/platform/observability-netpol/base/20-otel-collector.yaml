apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: opentelemetry-collector
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}     # OTLP from workloads + istiod
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - ports:
        - protocol: TCP
          port: 13133     # health (kubelet)
