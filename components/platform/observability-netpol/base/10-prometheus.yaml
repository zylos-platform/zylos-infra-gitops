apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 9090      # UI / remote-write / kubelet
  egress:
    - to:
        - namespaceSelector: {}             # scrape pod targets cluster-wide
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8     # node-exporter 9100, kubelet/cAdvisor 10250
      ports:
        - protocol: TCP
          port: 9100
        - protocol: TCP
          port: 10250
    - ports: # kube-apiserver service discovery
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
