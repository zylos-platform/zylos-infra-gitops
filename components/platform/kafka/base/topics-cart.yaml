apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: cart.cart.events.v1
  namespace: zylos-data-kafka
  labels:
    strimzi.io/cluster: zylos-kafka
spec:
  topicName: cart.cart.events.v1
  partitions: 6
  replicas: 1
  config:
    cleanup.policy: delete
    retention.ms: 2592000000 # 30 days
    min.insync.replicas: 1
    max.message.bytes: 1048576
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: cart.cart.snapshot.v1
  namespace: zylos-data-kafka
  labels:
    strimzi.io/cluster: zylos-kafka
spec:
  topicName: cart.cart.snapshot.v1
  partitions: 6
  replicas: 1
  config:
    cleanup.policy: compact
    min.insync.replicas: 1
    max.message.bytes: 1048576
    delete.retention.ms: 86400000 # 1 day
    min.cleanable.dirty.ratio: "0.1"
