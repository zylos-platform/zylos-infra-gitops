# DynamoDB Local — the in-cluster stand-in for the managed Amazon DynamoDB

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dynamodb-local-data
  namespace: zylos-data-dynamodb
  labels:
    app.kubernetes.io/name: dynamodb-local
    app.kubernetes.io/part-of: zylos-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-local
  namespace: zylos-data-dynamodb
  labels:
    app.kubernetes.io/name: dynamodb-local
    app.kubernetes.io/component: cart-datastore
    app.kubernetes.io/part-of: zylos-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dynamodb-local
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dynamodb-local
        app.kubernetes.io/component: cart-datastore
        zylos.app/namespace-tier: data
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dynamodb-local
          image: amazon/dynamodb-local:3.2.0
          args:
            - "-jar"
            - "DynamoDBLocal.jar"
            - "-sharedDb" # single DB across all dummy credential/region pairs
            - "-dbPath"
            - "/home/dynamodblocal/data"
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /home/dynamodblocal/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dynamodb-local-data
---
apiVersion: v1
kind: Service
metadata:
  name: dynamodb-local
  namespace: zylos-data-dynamodb
  labels:
    app.kubernetes.io/name: dynamodb-local
    app.kubernetes.io/part-of: zylos-platform
spec:
  selector:
    app.kubernetes.io/name: dynamodb-local
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
