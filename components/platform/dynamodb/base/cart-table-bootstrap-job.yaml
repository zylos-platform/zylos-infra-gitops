apiVersion: batch/v1
kind: Job
metadata:
  name: cart-table-bootstrap-job
  namespace: zylos-data-dynamodb
  labels:
    app.kubernetes.io/component: cart-table-bootstrap
    app.kubernetes.io/part-of: zylos-platform
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cart-table-bootstrap
        zylos.app/namespace-tier: data
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: public.ecr.aws/aws-cli/aws-cli:2.35.24
          command: ["/bin/sh", "/bootstrap/bootstrap.sh"]
          env:
            # DynamoDB Local accepts any credentials; these are placeholders.
            - name: AWS_ACCESS_KEY_ID
              value: "local"
            - name: AWS_SECRET_ACCESS_KEY
              value: "local"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: HOME
              value: "/tmp"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "50Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
          volumeMounts:
            - name: bootstrap-volume
              mountPath: /bootstrap
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: bootstrap-volume
          configMap:
            name: cart-table-bootstrap-config
        - name: tmp
          emptyDir: {}
