apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zylos-netpol-ztunnel
  namespace: istio-system
spec:
  podSelector:
    matchLabels:
      app: ztunnel
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # HBONE from in-mesh workloads
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 15008
    # Metrics from Prometheus
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 15020
    # Health from Kubelet
    - ports:
        - protocol: TCP
          port: 15021
  egress:
    # xDS to Istiod
    - to:
        - podSelector:
            matchLabels:
              app: istiod
      ports:
        - protocol: TCP
          port: 15012
    # HBONE to Mesh Pods (The core traffic path)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 15008
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
