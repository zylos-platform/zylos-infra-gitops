apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: istiod
  namespace: istio-system
spec:
  podSelector:
    matchLabels:
      app: istiod
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: [{ namespaceSelector: {} }]      # xDS from ztunnel/waypoints/clients
      ports:
        - { protocol: TCP, port: 15012 }
        - { protocol: TCP, port: 15010 }
    - ports: [{ protocol: TCP, port: 15017 }] # webhook from kube-apiserver
    - ports: [{ protocol: TCP, port: 8080 }]  # readiness/debug from kubelet
    - from:                                    # metrics from Prometheus
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports: [{ protocol: TCP, port: 15014 }]
  egress:
    - ports:                                   # kube-apiserver
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 6443 }
    - to:                                      # traces to OTel collector
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports: [{ protocol: TCP, port: 4317 }]
