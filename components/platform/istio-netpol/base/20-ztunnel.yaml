apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ztunnel
  namespace: istio-system
spec:
  podSelector:
    matchLabels:
      app: ztunnel
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: [{ namespaceSelector: {} }]      # HBONE from in-mesh sources
      ports: [{ protocol: TCP, port: 15008 }]
    - from:                                    # metrics from Prometheus
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports: [{ protocol: TCP, port: 15020 }]
    - ports: [{ protocol: TCP, port: 15021 }] # health from kubelet
  egress:
    - to: [{ podSelector: { matchLabels: { app: istiod } } }]  # xDS to istiod
      ports: [{ protocol: TCP, port: 15012 }]
    - to: [{ namespaceSelector: {} }]          # HBONE + decrypted delivery to mesh pods
