apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: zylos-netpol-baseline
spec:
  rules:
    - name: default-deny
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  app.kubernetes.io/part-of: zylos-platform
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: zylos-default-deny
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress

    - name: allow-dns
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  app.kubernetes.io/part-of: zylos-platform
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: zylos-allow-dns
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Egress
            egress:
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: kube-system
                    podSelector:
                      matchLabels:
                        k8s-app: kube-dns
                ports:
                  - protocol: UDP
                    port: 53
                  - protocol: TCP
                    port: 53
