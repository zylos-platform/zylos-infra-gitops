apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: zylos-netpol-baseline
spec:
  rules:
    - name: default-deny
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchExpressions:
                  - key: zylos.app/namespace-tier
                    operator: In
                    values:
                      - data
                      - tenant
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: zylos-default-deny
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress

    - name: allow-dns
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchExpressions:
                  - key: zylos.app/namespace-tier
                    operator: In
                    values:
                      - data
                      - tenant
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: zylos-allow-dns
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Egress
            egress:
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: kube-system
                    podSelector:
                      matchLabels:
                        k8s-app: kube-dns
                ports:
                  - protocol: UDP
                    port: 53
                  - protocol: TCP
                    port: 53

    - name: allow-node-probes
      match:
        any:
          - resources:
            kinds:
              - Namespace
            selector:
              matchExpressions:
                - key: zylos.app/namespace-tier
                  operator: In
                  values:
                    - data
                    - tenant
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: zylos-allow-node-probes
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
            ingress:
              - ports:
                  - protocol: TCP
                    port: 8080
                  - protocol: TCP
                    port: 8443

    - name: allow-intra-namespace
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  zylos.app/trust-zone: "true"
                matchExpressions:
                  - key: zylos.app/namespace-tier
                    operator: In
                    values:
                      - data
                      - tenant
      generate:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: zylos-allow-intra-namespace
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
            ingress:
              - from:
                  - podSelector: {}
            egress:
              - to:
                  - podSelector: {}
