apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-products-bootstrap-job
  namespace: zylos-data-opensearch
  labels:
    app.kubernetes.io/component: catalog-read-model-bootstrap
    app.kubernetes.io/part-of: zylos-platform
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: catalog-read-model-bootstrap
        zylos.app/namespace-tier: data
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: curlimages/curl:8.11.0
          command: ["/bin/sh", "/bootstrap/bootstrap.sh"]
          env:
            - name: OPENSEARCH_URL
              value: "https://opensearch.zylos-data-opensearch.svc.cluster.local:9200"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-admin-credentials
                  key: password
          volumeMounts:
            - name: bootstrap-volume
              mountPath: /bootstrap
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: bootstrap-volume
          configMap:
            name: catalog-products-bootstrap-config
