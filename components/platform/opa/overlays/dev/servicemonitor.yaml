apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: opa
  namespace: opa
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: authorization
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
      interval: 30s
