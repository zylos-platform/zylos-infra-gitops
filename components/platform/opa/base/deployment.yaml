apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: opa
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: authorization
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opa
        app.kubernetes.io/part-of: zylos-platform
        app.kubernetes.io/component: authorization
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: opa
      containers:
        - name: opa
          image: openpolicyagent/opa:1.15.2-static
          args:
            - "run"
            - "--server"
            - "--config-file=/config/config.yaml"
            - "--addr=0.0.0.0:8181"
            - "--diagnostic-addr=0.0.0.0:8282"
            - "--log-format=json"
            - "--log-level=info"
          env:
            - name: GHCR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ghcr-opa-token
                  key: token
          ports:
            - name: http
              containerPort: 8181
            - name: metrics
              containerPort: 8282
          startupProbe:                 # tolerate a slow first bundle pull from GHCR
            httpGet:
              path: /health?bundles=true
              port: metrics
            periodSeconds: 5
            failureThreshold: 24        # up to ~2 min before giving up
          readinessProbe:
            httpGet:
              path: /health?bundles=true
              port: metrics
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 250m
              memory: 128Mi
              ephemeral-storage: 200Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: opa-data
              mountPath: /var/opa
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: opa-config
        - name: opa-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
