apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zylos-catalog-schema-init-netpol
  namespace: zylos-data-mongodb
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: schema-init
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: percona-server-mongodb
      ports:
        - protocol: TCP
          port: 27017
