apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-mongodb-schema-init
  namespace: zylos-data-mongodb
  labels:
    app.kubernetes.io/name: catalog-mongodb
    app.kubernetes.io/component: schema-init
data:
  init-indexes.js: |
    print("Starting index initialization for catalog database...");
    const catalogDb = db.getSiblingDB("catalog");

    print("Creating outbox TTL index...");
    catalogDb.outbox.createIndex(
      { occurredAt: 1 },
      { expireAfterSeconds: 604800, name: "outbox_ttl_occurredAt", background: true }
    );

    print("Creating products index...");
    catalogDb.products.createIndex(
      { updatedAt: 1, _id: 1 }, { name: "idx_updatedAt_id" }
    );

    print("Creating idempotency TTL index...");
    catalogDb.idempotency.createIndex(
      { createdAt: 1 },
      { expireAfterSeconds: 172800, name: "idempotency_ttl_createdAt", background: true }
    );

    print("TTL Indexes successfully applied.");
---
apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-mongodb-schema-init-job
  namespace: zylos-data-mongodb
  labels:
    app.kubernetes.io/name: catalog-mongodb
    app.kubernetes.io/component: schema-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-mongodb
        app.kubernetes.io/component: schema-init
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mongo-init
          image: mongo:8.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              URI="mongodb://percona-server-mongodb-rs0.zylos-data-mongodb.svc.cluster.local:27017/catalog?replicaSet=rs0&authSource=catalog"

              echo "Waiting for MongoDB cluster to elect a Primary..."
              until mongosh "$URI" --username catalog --password "$MONGO_PASSWORD" --eval "db.adminCommand('ping')" --quiet > /dev/null 2>&1; do
                echo "  -> MongoDB not ready. Retrying in 5 seconds..."
                sleep 5
              done

              echo "MongoDB is ready. Applying schema definitions..."
              mongosh "$URI" --username catalog --password "$MONGO_PASSWORD" --file /scripts/init-indexes.js

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "50Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "500Mi"

          env:
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-mongodb-app-user
                  key: password
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: ephemeral-tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: script
          configMap:
            name: catalog-mongodb-schema-init
        - name: ephemeral-tmp
          emptyDir: {}
