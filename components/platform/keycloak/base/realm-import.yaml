###############################################################################
# Keycloak realm — bare-shell import.
#
# This manifest does ONE job: ensure the `zylos` realm exists. Nothing more.
#
# All realm content (clients, roles, users, client policies, signing key
# settings, token-exchange permissions, refresh-token reuse detection, etc.)
# is reconciled by keycloak-config-cli, reading from a canonical realm YAML
# in this repo.
#
# Why this split:
#   - The Keycloak Operator's KeycloakRealmImport controller is CREATE-ONLY:
#     it does not reconcile updates to existing realms. Putting the full
#     realm content here means changes to clients/roles/users would not be
#     applied without manually deleting and recreating the realm (and losing
#     all runtime state).
#   - keycloak-config-cli authenticates to the admin API and idempotently
#     reconciles the realm content, supporting CRUD across all realm objects.
###############################################################################
apiVersion: k8s.keycloak.org/v2beta1
kind: KeycloakRealmImport
metadata:
  name: zylos-realm
  namespace: platform
  labels:
    app.kubernetes.io/part-of: zylos-platform
spec:
  keycloakCRName: keycloak
  realm:
    realm: zylos
    enabled: true
