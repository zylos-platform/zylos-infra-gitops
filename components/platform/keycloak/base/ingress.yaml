###############################################################################
# Keycloak Ingress — the ONLY path to Keycloak's canonical origin
# http://keycloak.zylos.local, used identically by:
#   - browsers/host tools (via /etc/hosts → 127.0.0.1 → kind port mapping 80)
#   - in-cluster pods    (via CoreDNS rewrite *.zylos.local → ingress-nginx)
# Keycloak trusts X-Forwarded-* from this hop.
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: platform
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: identity
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  ingressClassName: nginx
  rules:
    - host: auth.zylos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak-service
                port:
                  number: 8080
