# ---------------------------------------------------------
# THE MESH & SECURITY (Highly Privileged - DO NOT TOUCH)
# ---------------------------------------------------------
---
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    pod-security.kubernetes.io/enforce: privileged
    app.kubernetes.io/part-of: zylos-platform
    zylos.app/namespace-tier: system
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
    app.kubernetes.io/part-of: zylos-platform
    zylos.app/namespace-tier: system
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    pod-security.kubernetes.io/enforce: privileged
    app.kubernetes.io/part-of: zylos-platform
    zylos.app/namespace-tier: system

# ---------------------------------------------------------
# PLATFORM CONTROL PLANE (Operators & Tooling)
# ---------------------------------------------------------
---
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
  labels:
    pod-security.kubernetes.io/enforce: baseline
    app.kubernetes.io/part-of: zylos-platform
    zylos.app/namespace-tier: control-plane
---
apiVersion: v1
kind: Namespace
metadata:
  name: opa
  labels:
    pod-security.kubernetes.io/enforce: baseline
    app.kubernetes.io/part-of: zylos-platform
    zylos.app/namespace-tier: control-plane
    istio.io/dataplane-mode: ambient

# ---------------------------------------------------------
# PLATFORM OBSERVABILITY (Out of Mesh)
# ---------------------------------------------------------
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    pod-security.kubernetes.io/enforce: privileged
    app.kubernetes.io/part-of: zylos-platform
    zylos.app/namespace-tier: observability

