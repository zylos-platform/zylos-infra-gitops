###############################################################################
# Keycloak server instance, managed by the Keycloak Operator.
###############################################################################
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: platform
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/name: keycloak
spec:
  instances: 1

  ingress:
    enabled: false

  networkPolicy:
    enabled: false

  # Custom Keycloak 26.6.1 image with the Zylos ActClaimMapper pre-installed
  # and `kc.sh build` baked in. Built and published by:
  #   https://github.com/zylos-platform/zylos-infra-keycloak-extensions
  # See docs/adr/0013-keycloak-custom-image-act-mapper.md.
  #
  # The Keycloak Operator automatically appends `--optimized` to the startup
  # command when spec.image is set. Our image is pre-built (kc.sh build ran
  # in the builder stage), so this works correctly.
  image: ghcr.io/zylos-platform/keycloak:26.6.1-zylos-act-0.1.0
  startOptimized: true

  # Database — points at the CloudNativePG read-write service.
  db:
    vendor: postgres
    host: keycloak-postgres-rw.platform.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-credentials
      key: username
    passwordSecret:
      name: keycloak-db-credentials
      key: password

  # HTTP only inside the cluster; TLS terminates at NGINX Ingress.
  http:
    httpEnabled: true
    httpPort: 8080

  # Hostname configuration. Local kind: keycloak.zylos.local
  # In prod: keycloak.zylos.app
  hostname:
    hostname: http://keycloak.zylos.local
    strict: true

  # Proxy mode: trust X-Forwarded-* headers from NGINX.
  proxy:
    headers: xforwarded

  # Bootstrap admin (initial admin user). After first login, create
  # additional admins via the realm and disable this.
  bootstrapAdmin:
    user:
      secret: keycloak-admin-credentials

  # Resources — modest for kind, adjusted in production overlays.
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Operator's pod template overrides.
  unsupported:
    podTemplate:
      spec:
        containers:
          - name: keycloak
            env:
              - name: KC_HEALTH_ENABLED
                value: "true"
              - name: KC_METRICS_ENABLED
                value: "true"
              - name: KC_LOG_LEVEL
                value: "INFO"
