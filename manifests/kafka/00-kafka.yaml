###############################################################################
# Kafka cluster (KRaft). Single combined controller+broker for local kind.
# Bootstrap (for SR/Connect/catalog): zylos-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
# Prod: 3 brokers, RF 3 / minISR 2, TLS + SCRAM/mTLS listeners.
###############################################################################
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: zylos-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    # version omitted -> operator's default
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
