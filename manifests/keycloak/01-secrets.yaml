###############################################################################
# Dev-only secrets for Keycloak.
#
# WARNING: Plain Secret manifests in Git. Acceptable ONLY for local kind
# cluster. In production these come from External Secrets Operator pulling
# from AWS Secrets Manager. See ADR 0003.
#
# CloudNativePG uses 'username' and 'password' keys (not 'postgres-password').
###############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-credentials
  namespace: keycloak
type: kubernetes.io/basic-auth
stringData:
  username: keycloak
  password: keycloak_dev_pw
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-credentials
  namespace: keycloak
type: Opaque
stringData:
  username: admin
  password: admin
