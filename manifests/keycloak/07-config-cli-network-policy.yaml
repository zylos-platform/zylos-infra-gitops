apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-config-cli-network-policy
  namespace: keycloak
  labels:
    app.kubernetes.io/part-of: zylos-platform
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak-config-cli
      ports:
        - protocol: TCP
          port: 8080
