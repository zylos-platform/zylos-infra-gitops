###############################################################################
# Keycloak realm ConfigMap — same realm definition as zylos-local-env.
# In production, this would be templated/generated; for now we inline it.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: zylos-realm
  namespace: keycloak
data:
  zylos-realm.json: |
    {
      "realm": "zylos",
      "enabled": true,
      "displayName": "Zylos Platform",
      "registrationAllowed": false,
      "rememberMe": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "bruteForceProtected": true,
      "accessTokenLifespan": 900,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "roles": {
        "realm": [
          { "name": "customer" },
          { "name": "seller" },
          { "name": "admin" },
          { "name": "support" }
        ]
      },
      "clients": [
        {
          "clientId": "zylos-web",
          "publicClient": true,
          "standardFlowEnabled": true,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        },
        {
          "clientId": "zylos-internal",
          "publicClient": false,
          "secret": "zylos-internal-dev-secret-change-me",
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false
        }
      ]
    }
---
###############################################################################
# Dev secrets for Keycloak — DEV ONLY. Production secrets come from
# External Secrets Operator pulling from AWS Secrets Manager.
###############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: keycloak
type: Opaque
stringData:
  username: admin
  password: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db
  namespace: keycloak
type: Opaque
stringData:
  postgres-password: keycloak_dev_pw
  password: keycloak_dev_pw
