# Keycloak Operator — pinned to v26.6.1, sourced from upstream:
#
#   https://github.com/keycloak/keycloak-k8s-resources/tree/26.6.1/kubernetes
#
# Rather than fetch at sync-time (network-dependent, reproducibility risk),
# we commit the rendered manifests here. To update: pull the new version's
# YAML and replace this file.
#
# The upstream ships three files; concatenate in this order:
#   1. keycloaks.k8s.keycloak.org-v1.yml       (CRD)
#   2. keycloakrealmimports.k8s.keycloak.org-v1.yml  (CRD)
#   3. kubernetes.yml                                (operator deployment + RBAC)
#
# Pull them with:
#   curl https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.6.1/kubernetes/keycloaks.k8s.keycloak.org-v1.yml > 01-crd-keycloaks.yaml
#   curl https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.6.1/kubernetes/keycloakrealmimports.k8s.keycloak.org-v1.yml > 02-crd-realmimports.yaml
#   curl https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.6.1/kubernetes/kubernetes.yml > 03-operator.yaml
#
# Argo CD applies all three via the directory source.
