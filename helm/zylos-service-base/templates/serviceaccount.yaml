{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "service.serviceAccountName" . }}
  labels: {{ include "service.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
# automountServiceAccountToken at the SA level is overridden by the pod-level
# setting in the Deployment (which we always set explicitly). Keeping the SA
# default here permits opt-in workloads that need K8s API access to flip the
# pod-level value without touching the SA.
automountServiceAccountToken: true
{{- end }}
