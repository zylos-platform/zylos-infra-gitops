###############################################################################
# OpenSearch — single-node, security plugin DISABLED for local dev (HTTP, no
# TLS, no auth). Hosts the Catalog CQRS read model.
#
# HOST PREREQUISITE (WSL2 — kind shares the host kernel):
#   sudo sysctl -w vm.max_map_count=262144
#   echo 'vm.max_map_count=262144' | sudo tee -a /etc/sysctl.conf
# If you can't set the host sysctl, set sysctlInit.enabled: true below AND
# change the opensearch namespace to pod-security 'privileged'.
#
# In-cluster URL (for 2.4): http://opensearch.opensearch.svc.cluster.local:9200
# Prod: AWS OpenSearch Service with fine-grained access control + TLS.
###############################################################################
clusterName: opensearch
masterService: opensearch

singleNode: true
replicas: 1

opensearchJavaOpts: "-Xms512m -Xmx512m"

# Disable the security plugin -> plain HTTP on 9200.
extraEnvs:
  - name: DISABLE_SECURITY_PLUGIN
    value: "true"
securityConfig:
  enabled: false
protocol: http

# vm.max_map_count handled on the host (see header) -> keep the privileged
# init container off so the namespace stays 'baseline'.
sysctlInit:
  enabled: false

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: "1"
    memory: 1536Mi
