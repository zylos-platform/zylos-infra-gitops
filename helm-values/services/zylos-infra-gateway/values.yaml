# values.yaml

fullnameOverride: "zylos-infra-gateway"

image:
  repository: ghcr.io/zylos-platform/zylos-infra-gateway
  tag: "20260608-f775141" # CI replaces with a date-sha tag on each merged push to main

serviceMonitor:
  enabled: true

networkPolicy:
  enabled: true
  ingress:
    fromIstio: true
    fromObservability: true
  egress:
    toDns: true
    toIstio: true
    toSamePlatform: true
    toKeycloak: true
    toObservability: true
    toExternal: false

extraEnv:
  - name: ZYLOS_JWK_SET_URI
    value: "http://keycloak.zylos.local/realms/zylos/protocol/openid-connect/certs"

  - name: ZYLOS_TOKEN_ENDPOINT
    value: "http://keycloak.zylos.local/realms/zylos/protocol/openid-connect/token"

  - name: ZYLOS_HELLO_SERVICE_URI
    value: "http://zylos-service-hello.zylos-services.svc.cluster.local:8080"

  - name: ZYLOS_CATALOG_SERVICE_URI
    value: "http://zylos-service-catalog.zylos-services.svc.cluster.local:8080"

  - name: ZYLOS_GATEWAY_CLIENT_ID
    value: "zylos-gateway"

  - name: ZYLOS_GATEWAY_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: zylos-gateway-secrets
        key: gateway-secret
