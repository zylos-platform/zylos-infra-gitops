# values.yaml

fullnameOverride: "zylos-infra-gateway"

image:
  repository: ghcr.io/zylos-platform/zylos-infra-gateway
  tag: "20260709-5d41a71" # CI replaces with a date-sha tag on each merged push to main

serviceMonitor:
  enabled: true

networkPolicy:
  enabled: true
  ingress:
    fromIstio: true
    fromObservability: true
  egress:
    toDns: true
    toIstio: true
    toSamePlatform: true
    toKeycloak: true
    toObservability: true
    toExternal: false

extraEnv:
  ZYLOS_JWK_SET_URI: "http://auth.zylos.local/realms/zylos/protocol/openid-connect/certs"
  ZYLOS_TOKEN_ENDPOINT: "http://auth.zylos.local/realms/zylos/protocol/openid-connect/token"
  ZYLOS_HELLO_SERVICE_URI: "http://zylos-service-hello.zylos-services.svc.cluster.local:8080"
  ZYLOS_CATALOG_SERVICE_URI: "http://zylos-service-catalog.zylos-services.svc.cluster.local:8080"
  ZYLOS_GATEWAY_CLIENT_ID: "zylos-gateway"

  ZYLOS_GATEWAY_CLIENT_SECRET:
    valueFrom:
      secretKeyRef:
        name: zylos-gateway-secret
        key: gateway-secret
