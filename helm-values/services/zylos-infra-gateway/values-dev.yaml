# values-dev.yaml

springProfile: dev
environment: dev

# High Availability
replicaCount: 2

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Overrides for the cloud environment
extraEnv:
  ZYLOS_ISSUER_URI: "https://auth.zylos.app/realms/zylos"
  ZYLOS_TRUSTED_PROXIES: "172\\.16\\..*"
