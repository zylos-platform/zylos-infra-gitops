# values.yaml

fullnameOverride: "zylos-service-catalog"

image:
  repository: ghcr.io/zylos-platform/zylos-service-catalog
  tag: "20260722-a761737" # CI bumps

ingress:
  enabled: false

serviceMonitor:
  enabled: true

networkPolicy:
  enabled: true
  ingress:
    fromIstio: true
    fromObservability: true
    fromIngressNginx: false
    extra:
      # Allow traffic from the reconciliation cron job.
      - from:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-services
            podSelector:
              matchLabels:
                app.kubernetes.io/name: zylos-service-catalog
                app.kubernetes.io/component: reconciliation
        ports:
          - protocol: TCP
            port: 9000
  egress:
    toDns: true
    toIstio: true
    toSamePlatform: false
    toKeycloak: true
    toOpa: true
    toObservability: true
    extra:
      # MongoDB (Percona) — write model + outbox.
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-data-mongodb
        ports:
          - protocol: TCP
            port: 27017
      # Valkeyrie — distributed cache for read-model projections.
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-data-valkey
        ports:
          - protocol: TCP
            port: 6379
      # Kafka namespace: Schema Registry (8081) + broker (9092, projection consumer + DLT producer).
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-data-kafka
        ports:
          - protocol: TCP
            port: 9092
          - protocol: TCP
            port: 9093
          - protocol: TCP
            port: 8081
      # OpenSearch — read-model projection store.
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-data-opensearch
        ports:
          - protocol: TCP
            port: 9200

extraEnv:
  ZYLOS_JWK_SET_URI: "http://auth.zylos.local/realms/zylos/protocol/openid-connect/certs"
  ZYLOS_SECURITY_OPA_ENDPOINT: "http://opa.opa.svc.cluster.local:8181"

  ZYLOS_CATALOG_MONGODB_HOST: "percona-server-mongodb-rs0.zylos-data-mongodb.svc.cluster.local"
  ZYLOS_CATALOG_MONGODB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: catalog-mongodb-app-user
        key: password

  ZYLOS_CATALOG_SCHEMA_REGISTRY_URL: "http://schema-registry.zylos-data-kafka.svc.cluster.local:8081"
  ZYLOS_CATALOG_AUTO_REGISTER_SCHEMAS: "true"

  ZYLOS_CATALOG_VALKEY_HOST: "valkey.zylos-data-valkey.svc.cluster.local"
  ZYLOS_CATALOG_VALKEY_PORT: "6379"
  ZYLOS_CATALOG_VALKEY_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: catalog-valkey-app-user
        key: password

  ZYLOS_CATALOG_KAFKA_BOOTSTRAP: "zylos-kafka-kafka-bootstrap.zylos-data-kafka.svc.cluster.local:9092"

  ZYLOS_CATALOG_PROJECTION_GROUP: "catalog-projection"
  ZYLOS_CATALOG_EVENT_TOPIC: "catalog.product.events.v1"

  ZYLOS_CATALOG_CACHE_PREFIX: "catalog:product:"
  ZYLOS_CATALOG_CACHE_TTL_SECONDS: "600"

  ZYLOS_SERVICE_VERSION: "0.1.0"

  ZYLOS_CATALOG_OPENSEARCH_URI: "http://opensearch.zylos-data-opensearch.svc.cluster.local:9200"
  ZYLOS_CATALOG_OPENSEARCH_ALIAS: "catalog-products"
  ZYLOS_CATALOG_OPENSEARCH_USERNAME: "catalog_service"
  ZYLOS_CATALOG_OPENSEARCH_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: catalog-opensearch-app-user
        key: password

  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://opentelemetry-collector.observability.svc.cluster.local:4318/v1/traces"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "http://opentelemetry-collector.observability.svc.cluster.local:4318/v1/metrics"
