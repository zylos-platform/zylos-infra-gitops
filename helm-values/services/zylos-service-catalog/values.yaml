# values.yaml

fullnameOverride: "zylos-service-catalog"

image:
  repository: ghcr.io/zylos-platform/zylos-service-catalog
  tag: "20260626-3ea9821" # CI bumps

ingress:
  enabled: false

serviceMonitor:
  enabled: true

networkPolicy:
  enabled: true
  ingress:
    fromIstio: true
    fromObservability: true
    fromIngressNginx: false
  egress:
    toDns: true
    toIstio: true
    toSamePlatform: false
    toKeycloak: true
    toOpa: true
    toObservability: true
    extra:
      # MongoDB (Percona) — write model + outbox.
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-data-mongodb
        ports:
          - protocol: TCP
            port: 27017
      # Valkeyrie — distributed cache for read-model projections.
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-data-valkey
        ports:
          - protocol: TCP
            port: 6379
      # Kafka namespace: Schema Registry (8081) + broker (9092, projection consumer + DLT producer).
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-data-kafka
        ports:
          - protocol: TCP
            port: 9092
          - protocol: TCP
            port: 9093
          - protocol: TCP
            port: 8081
      # OpenSearch — read-model projection store.
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: zylos-data-opensearch
        ports:
          - protocol: TCP
            port: 9200

extraEnv:
  - name: ZYLOS_JWK_SET_URI
    value: "http://keycloak.zylos.local/realms/zylos/protocol/openid-connect/certs"

  - name: ZYLOS_SECURITY_OPA_ENDPOINT
    value: "http://opa.opa.svc.cluster.local:8181"

  - name: ZYLOS_CATALOG_MONGODB_HOST
    value: "percona-server-mongodb-rs0.zylos-data-mongodb.svc.cluster.local"
  - name: ZYLOS_CATALOG_MONGODB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: catalog-mongodb-app-user
        key: password

  - name: ZYLOS_CATALOG_SCHEMA_REGISTRY_URL
    value: "http://schema-registry.zylos-data-kafka.svc.cluster.local:8081"
  - name: ZYLOS_CATALOG_AUTO_REGISTER_SCHEMAS
    value: "true"

  - name: ZYLOS_CATALOG_VALKEY_HOST
    value: "valkey.zylos-data-valkey.svc.cluster.local"
  - name: ZYLOS_CATALOG_VALKEY_PORT
    value: "6379"
  - name: ZYLOS_CATALOG_VALKEY_PASSWORD
    valueFrom:
      secretKeyRef:
        name: catalog-valkey-app-user
        key: password

  - name: ZYLOS_CATALOG_KAFKA_BOOTSTRAP
    value: "zylos-kafka-kafka-bootstrap.zylos-data-kafka.svc.cluster.local:9092"

  - name: ZYLOS_CATALOG_PROJECTION_GROUP
    value: "catalog-projection"
  - name: ZYLOS_CATALOG_EVENT_TOPIC
    value: "catalog.product.events.v1"

  - name: ZYLOS_CATALOG_CACHE_PREFIX
    value: "catalog:product:"
  - name: ZYLOS_CATALOG_CACHE_TTL_SECONDS
    value: "600"

  - name: ZYLOS_SERVICE_VERSION
    value: "0.1.0"

  - name: ZYLOS_CATALOG_OPENSEARCH_URI
    value: "http://opensearch.zylos-data-opensearch.svc.cluster.local:9200"
  - name: ZYLOS_CATALOG_OPENSEARCH_ALIAS
    value: "catalog-products"
  - name: ZYLOS_CATALOG_OPENSEARCH_USERNAME
    value: "catalog_service"
  - name: ZYLOS_CATALOG_OPENSEARCH_PASSWORD
    valueFrom:
      secretKeyRef:
        name: catalog-opensearch-app-user
        key: password

  - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
    value: "http://opentelemetry-collector.observability.svc.cluster.local:4318/v1/traces"
  - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
    value: "http://opentelemetry-collector.observability.svc.cluster.local:4318/v1/metrics"
