###############################################################################
# zylos-hello-service — values for the local kind cluster.
# Image tag is bumped automatically by CI's deploy-PR.
###############################################################################

image:
  repository: ghcr.io/zylos-platform/zylos-hello-service
  tag: "latest" # CI replaces this on each merged push to main

replicaCount: 2

springProfile: prod

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: hello.zylos.local
      paths:
        - path: /
          pathType: Prefix

serviceMonitor:
  enabled: true
