###############################################################################
# zylos-service-catalog — values for the local kind cluster.
# Image tag is bumped automatically by CI's deploy-PR.
# Consumes zylos-service-base v0.2.0.
###############################################################################

fullnameOverride: "zylos-service-catalog"

image:
  repository: ghcr.io/zylos-platform/zylos-service-catalog
  tag: "20260626-3ea9821" # CI bumps

replicaCount: 2

springProfile: prod
environment: dev

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

ingress:
  enabled: false

serviceMonitor:
  enabled: true

# NetworkPolicy: catalog is reached internally (gateway / peer services); no public ingress.
# Datastore egress (Mongo / Kafka / OpenSearch / Redis) is added alongside persistence in 2.2+.
networkPolicy:
  enabled: true
  ingress:
    fromIstio: true
    fromObservability: true
    fromIngressNginx: false
  egress:
    toDns: true
    toIstio: true
    toSamePlatform: false # no synchronous peer calls yet
    toKeycloak: true # JWKS
    toOpa: true
    toObservability: true
    extra:
      # MongoDB (Percona) in the mongodb namespace.
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: mongodb
        ports:
          - protocol: TCP
            port: 27017
      # Confluent Schema Registry in the kafka namespace.
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kafka
        ports:
          - protocol: TCP
            port: 8081

extraEnv:
  - name: ZYLOS_ISSUER_URI
    value: "http://keycloak.zylos.local/realms/zylos"
  - name: ZYLOS_JWK_SET_URI
    value: "http://keycloak.zylos.local/realms/zylos/protocol/openid-connect/certs"
  - name: ZYLOS_SECURITY_OPA_ENDPOINT
    value: "http://opa.opa.svc.cluster.local:8181"
  - name: ZYLOS_CATALOG_MONGODB_HOST
    value: "catalog-mongodb-rs0.mongodb.svc.cluster.local"
  - name: ZYLOS_CATALOG_MONGODB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: catalog-mongodb-app-user
        key: password
  - name: ZYLOS_CATALOG_SCHEMA_REGISTRY_URL
    value: "http://schema-registry.kafka.svc.cluster.local:8081"
  - name: ZYLOS_CATALOG_AUTO_REGISTER_SCHEMAS
    value: "true"

pdb:
  enabled: true
  maxUnavailable: 1

autoscaling:
  enabled: false
