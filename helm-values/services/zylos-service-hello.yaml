###############################################################################
# zylos-service-hello — values for the local kind cluster.
# Image tag is bumped automatically by CI's deploy-PR.
# Consumes zylos-service-base v0.2.0 features (NetworkPolicy, PDB, etc.).
###############################################################################

fullnameOverride: "zylos-service-hello"

image:
  repository: ghcr.io/zylos-platform/zylos-service-hello
  tag: "20260601-ecf07da" # CI replaces this on each merged push to main
  # digest: ""            # When CI starts emitting digests, this overrides tag

replicaCount: 2

springProfile: prod
environment: dev

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: hello.zylos.local
      paths:
        - path: /
          pathType: Prefix

serviceMonitor:
  enabled: true

# NetworkPolicy: hello-service is exposed via NGINX ingress, so allow that.
networkPolicy:
  enabled: true
  ingress:
    fromIstio: true
    fromObservability: true
    fromIngressNginx: true # Required because ingress.enabled=true above

# PDB: with replicaCount=2 and maxUnavailable=1, at least one pod is always
# available during voluntary disruptions.
pdb:
  enabled: true
  maxUnavailable: 1

# Autoscaling: disabled for the reference service. Real services will enable
# this with appropriate min/max replica caps.
autoscaling:
  enabled: false
