###############################################################################
# zylos-service-hello — values for the local kind cluster.
# Image tag is bumped automatically by CI's deploy-PR.
# Consumes zylos-service-base v0.2.0 features (NetworkPolicy, PDB, etc.).
###############################################################################

fullnameOverride: "zylos-service-hello"

image:
  repository: ghcr.io/zylos-platform/zylos-service-hello
  tag: "20260613-37da61d" # CI replaces this on each merged push to main
  # digest: ""            # When CI starts emitting digests, this overrides tag

replicaCount: 2

springProfile: prod
environment: dev

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

ingress:
  enabled: false

serviceMonitor:
  enabled: true

# NetworkPolicy: hello-service is exposed via gateway.
networkPolicy:
  enabled: true
  ingress:
    fromIstio: true # gateway→service transits ztunnel (istio-system)
    fromObservability: true
    fromIngressNginx: false
  egress:
    toDns: true
    toIstio: true
    toSamePlatform: true
    toKeycloak: true
    toOpa: true
    toObservability: true

extraEnv:
  - name: ZYLOS_ISSUER_URI
    value: "http://keycloak.zylos.local/realms/zylos"
  - name: ZYLOS_JWK_SET_URI
    value: "http://keycloak.zylos.local/realms/zylos/protocol/openid-connect/certs"
  - name: ZYLOS_SECURITY_OPA_ENDPOINT
    value: "http://opa.opa.svc.cluster.local:8181"

# PDB: with replicaCount=2 and maxUnavailable=1, at least one pod is always
# available during voluntary disruptions.
pdb:
  enabled: true
  maxUnavailable: 1

# Autoscaling: disabled for the reference service. Real services will enable
# this with appropriate min/max replica caps.
autoscaling:
  enabled: false
