# values-local.yaml

springProfile: local
environment: local

# Laptop optimization
replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 512Mi

pdb:
  enabled: false

autoscaling:
  enabled: false

extraEnv:
  - name: ZYLOS_ISSUER_URI
    value: "http://auth.zylos.local/realms/zylos"
