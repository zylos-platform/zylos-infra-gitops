###############################################################################
# OpenTelemetry Collector — fans out to Tempo (traces), Prometheus (metrics),
# and Loki (logs). Mirrors the local Compose config in zylos-local-env.
###############################################################################

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  extensions:
    health_check:
      endpoint: "0.0.0.0:13133"

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
      spike_limit_mib: 128

  exporters:
    otlphttp/tempo:
      endpoint: http://tempo.observability.svc.cluster.local:4318
      tls:
        insecure: true

    prometheusremotewrite:
      endpoint: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
      tls:
        insecure: true

    otlphttp/loki:
      endpoint: http://loki-gateway.observability.svc.cluster.local/otlp
      tls:
        insecure: true

    debug:
      verbosity: basic

  service:
    extensions: [health_check]

    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp/tempo, debug]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheusremotewrite, debug]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp/loki, debug]

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
