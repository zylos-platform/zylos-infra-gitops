# Monolithic mode is the recommended deployment for our cluster size.
# Microservices mode is for very high-throughput production at scale.
deploymentMode: SingleBinary

loki:
  auth_enabled: false # Local dev; prod uses tenant headers
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h
    allow_structured_metadata: true
    volume_enabled: true

# Disable distributed-mode components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Minio for chunks/index storage in dev — disabled, using filesystem
minio:
  enabled: false

# Promtail/Grafana Alloy NOT bundled here; we use OTel Collector for log
# ingestion (consistent with metrics/traces pipeline).
gateway:
  enabled: true
