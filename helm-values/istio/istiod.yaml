profile: ambient

# Istiod control plane configuration
pilot:
  env:
    PILOT_ENABLE_AMBIENT: "true"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Mesh-wide telemetry: prefer OpenTelemetry over the deprecated Mixer
meshConfig:
  accessLogFile: /dev/stdout
  defaultConfig:
    holdApplicationUntilProxyStarts: false
    proxyMetadata:
      ISTIO_META_DNS_CAPTURE: "true"
  enableTracing: true
  defaultProviders:
    tracing:
      - opentelemetry
  extensionProviders:
    - name: opentelemetry
      opentelemetry:
        service: opentelemetry-collector.observability.svc.cluster.local
        port: 4317
