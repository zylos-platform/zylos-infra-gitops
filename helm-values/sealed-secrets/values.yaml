# values.yaml

fullnameOverride: sealed-secrets-controller

# Single replica is sufficient for kind. The controller's master encryption
# key is stored as a Kubernetes Secret in the same namespace; recreating the
# pod doesn't lose the key. Production AWS would use ESO instead so this
# remains kind-only.
replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Pod-level hardening
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Metrics: deferred until kube-prometheus-stack syncs.
# Argo CD self-heal will eventually create the ServiceMonitor once the
# CRD is available, but we explicitly opt in here for clarity.
metrics:
  serviceMonitor:
    enabled: true
    namespace: sealed-secrets
    labels:
      release: kube-prometheus-stack

# The controller talks only to the Kubernetes API.
networkPolicy:
  enabled: false

# Pod Disruption Budget — single replica in kind; not applicable.
pdb:
  create: false
