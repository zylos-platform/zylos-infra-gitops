###############################################################################
# Argo CD installation values.
#
# Used ONLY for the initial `helm install` during cluster bootstrap.
# After bootstrap, Argo CD manages itself via the `argocd` child Application
# in argocd/apps/argocd.yaml — that file pins the SAME version of these values.
#
# Changes to this file should be mirrored to argocd/apps/argocd.yaml so that
# future reconciliations don't fight the bootstrap.
###############################################################################

global:
  domain: argocd.zylos.local

# CRDs are managed by the chart for simplicity.
crds:
  install: true
  keep: true

configs:
  cm:
    # Enable Helm chart values templating in Application manifests
    timeout.reconciliation: 180s
    # Allow apps in any namespace to reference repos
    application.namespaces: "argocd,zylos-*"
    # Surface Kubernetes events as resource-level health
    resource.exclusions: |
      - apiGroups:
          - "*"
        kinds:
          - "Event"

  params:
    # Server-side apply is the default in v3, but explicit is better than implicit
    server.insecure: "true"   # Local dev only; behind Istio gateway in prod
    application.namespaces: "argocd,zylos-*"
    controller.diff.server.side: "true"

  rbac:
    policy.default: role:readonly

server:
  replicas: 1

  # For local dev clusters (kind), expose via NodePort. In production we
  # expose via Istio ingress gateway.
  service:
    type: ClusterIP

  # Allow access via "argocd CLI" without forcing TLS (local dev)
  extraArgs:
    - --insecure

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

controller:
  replicas: 1

dex:
  enabled: false

notifications:
  enabled: false

# Redis is bundled. Single-node is fine for our scale.
redis:
  enabled: true

redis-ha:
  enabled: false
