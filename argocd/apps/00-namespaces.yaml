###############################################################################
# Pre-create the namespaces that downstream Applications deploy into.
# Numeric prefix (00-) ensures Argo CD applies this first via sync waves.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
spec:
  project: platform
  source:
    repoURL: https://github.com/zylos-platform/zylos-platform-bootstrap.git
    targetRevision: main
    path: manifests/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false # Never auto-delete namespaces — too dangerous
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
