###############################################################################
# Dedicated Postgres for Keycloak.
#
# Why a SEPARATE Application (not the embedded sub-chart of Keycloak's helm)?
#   - Mirrors production where Keycloak runs against AWS Aurora — a separate,
#     managed database with its own lifecycle.
#
#
# This is sync wave 8 — runs BEFORE Keycloak (wave 10) so the DB is ready when
# Keycloak attempts to connect.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: identity-database
spec:
  project: platform
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: "16.*"
      helm:
        releaseName: keycloak-postgres
        valueFiles:
          - $values/helm-values/keycloak/keycloak-postgres.yaml
    - repoURL: https://github.com/zylos-platform/zylos-platform-bootstrap.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: false # NEVER auto-prune the database
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
