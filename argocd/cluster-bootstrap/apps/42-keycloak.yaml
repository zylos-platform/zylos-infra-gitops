###############################################################################
# Keycloak instance and realm import.
#
# Creates:
#   - A CloudNativePG Postgres `Cluster` for Keycloak's database.
#   - A `Keycloak` CR (the actual server, with replicas, hostname, DB binding).
#   - A `KeycloakRealmImport` CR (the zylos realm, declarative).
#
# Sync wave 10 ensures this runs AFTER both the Keycloak operator (wave 8)
# and CloudNativePG operator (wave 5) are healthy.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: identity
spec:
  project: platform
  source:
    repoURL: https://github.com/zylos-platform/zylos-platform-bootstrap.git
    targetRevision: main
    path: manifests/keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
