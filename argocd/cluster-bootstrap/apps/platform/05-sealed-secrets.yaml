###############################################################################
# Sealed Secrets controller — encrypted-at-rest secrets in Git.
#
# In kind dev clusters: this controller is the encryption backend.
# In AWS production: SealedSecret resources are NOT used; ESO + AWS Secrets
#   Manager is the path. See ADR 0007.
#
# Naming alignment: the chart defaults to release name `sealed-secrets`, but
# the kubeseal CLI defaults to looking up `sealed-secrets-controller`. We
# override fullnameOverride to bridge the gap so kubeseal works without flags.
#
# Sync wave -49 places the controller right after Argo CD itself (-50) and
# before all other platform components, so any downstream component that uses
# SealedSecret resources finds the controller already running.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-49"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: secrets
spec:
  project: platform
  sources:
    - repoURL: https://bitnami.github.io/sealed-secrets
      chart: sealed-secrets
      targetRevision: 2.18.5
      helm:
        releaseName: sealed-secrets
        valueFiles:
          - $values/helm-values/sealed-secrets/sealed-secrets.yaml
    - repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false # Namespace pre-created by app 00-namespaces
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
