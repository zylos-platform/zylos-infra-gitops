###############################################################################
# Percona Operator for MongoDB. Manages the replica set, keyfile/internal auth,
# SCRAM users, and (in prod) backups/PITR via the PerconaServerMongoDB CR.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: percona-mongodb-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: database
spec:
  project: platform
  source:
    repoURL: https://percona.github.io/percona-helm-charts
    chart: psmdb-operator
    targetRevision: 1.23.0
    helm:
      releaseName: psmdb-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: mongodb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
