###############################################################################
# Valkey — Catalog cache-aside layer. Official valkey-io chart.
# Standalone for local kind; prod -> ElastiCache for Valkey.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: valkey
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: cache
spec:
  project: platform
  sources:
    - repoURL: https://valkey.io/valkey-helm
      chart: valkey
      targetRevision: 0.10.0
      helm:
        releaseName: valkey
        valueFiles:
          - $values/helm-values/valkey/valkey.yaml
    - repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: valkey
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
