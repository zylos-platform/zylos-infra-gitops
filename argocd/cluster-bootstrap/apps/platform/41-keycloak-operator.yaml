###############################################################################
# Keycloak Operator — official upstream operator from the Keycloak project.
#
# Installs from the project's k8s-resources GitHub repo (it's not packaged as
# a Helm chart; the upstream project ships kustomize-friendly YAML).
#
# Provides two CRDs:
#   - keycloaks.k8s.keycloak.org    (a Keycloak server instance)
#   - keycloakrealmimports.k8s.keycloak.org  (declarative realm config)
#
# We pin to v26.6.1 to match the same Keycloak version used in our local
# Docker Compose stack and the Compose realm definition.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: identity
spec:
  project: platform
  source:
    repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
    targetRevision: main
    path: manifests/keycloak-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
