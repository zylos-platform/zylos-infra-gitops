###############################################################################
# zylos-service-catalog Argo CD Application.
# Composes helm/zylos-service-base/ with helm-values/services/zylos-service-catalog.yaml.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zylos-service-catalog
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20" # After all platform components
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: application-service
spec:
  project: apps
  sources:
    - repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
      targetRevision: main
      path: helm/zylos-service-base
      helm:
        releaseName: zylos-service-catalog
        valueFiles:
          - $values/helm-values/services/zylos-service-catalog.yaml
    - repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: zylos-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
