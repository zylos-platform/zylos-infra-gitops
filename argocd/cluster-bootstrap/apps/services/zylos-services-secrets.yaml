###############################################################################
# Sealed Secrets for the zylos-services namespace (gateway client secret, and
# future service credentials). Synced before the services themselves (wave 19).
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zylos-services-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "19"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: zylos-platform
    app.kubernetes.io/component: secrets
spec:
  project: apps
  source:
    repoURL: https://github.com/zylos-platform/zylos-infra-gitops.git
    targetRevision: main
    path: manifests/zylos-services
  destination:
    server: https://kubernetes.default.svc
    namespace: zylos-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
